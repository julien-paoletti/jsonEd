<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSONed — Graphical JSON Editor</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="toolbar">
    <h1>JSONed</h1>
    <button class="btn" id="btn-new" title="New document">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
      </svg>
      New
    </button>
    <button class="btn" id="btn-open" title="Open JSON file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
      </svg>
      Open
    </button>
    <button class="btn" id="btn-save" title="Save JSON file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
        <polyline points="17 21 17 13 7 13 7 21" />
        <polyline points="7 3 7 8 15 8" />
      </svg>
      Save
    </button>
    <div class="toolbar-separator"></div>
    <button class="btn" id="btn-collapse-all" title="Collapse all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
        <line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      Collapse
    </button>
    <button class="btn" id="btn-expand-all" title="Expand all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      Expand
    </button>
    <input type="file" id="file-input" accept=".json" style="display:none">
    <span id="filename-display">untitled.json</span>
  </div>

  <div id="select-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      style="width:14px;height:14px;flex-shrink:0;color:var(--subtext)">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input id="select-input" type="text" placeholder=".key  /  .a.b  /  .items[] | select(.type == &quot;x&quot;)"
      spellcheck="false">
    <span id="select-count"></span>
    <button class="btn" id="btn-select-close" style="padding:3px 8px;font-size:11px">✕</button>
  </div>

  <div id="main">
    <div id="editor-panel">
      <div id="root-node"></div>
    </div>
    <div id="preview-panel">
      <div id="preview-header">
        <h2>JSON Preview</h2>
        <button class="btn" id="btn-paste" title="Paste JSON from clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
          </svg>
          Paste
        </button>
        <button class="btn" id="btn-copy" title="Copy JSON to clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          Copy
        </button>
      </div>
      <div id="preview-content"></div>
    </div>
  </div>

  <div id="hints">
    <span><kbd>Tab</kbd> key → next field / new entry</span>
    <span><kbd>↓</kbd> in value → nest object/array</span>
    <span><kbd>Backspace</kbd> on empty key → delete entry</span>
    <span><kbd>Ctrl+S</kbd> save</span>
    <span><kbd>Ctrl+F</kbd> select</span>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
